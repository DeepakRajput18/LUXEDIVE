version: '3.8'

services:
  postgres:
    image: supabase/postgres:15.1.0.117
    ports:
      - "54322:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./supabase/docker/volumes/db/data:/var/lib/postgresql/data

  studio:
    image: supabase/studio:20231123-64a766a
    ports:
      - "54323:3000"
    environment:
      SUPABASE_URL: http://localhost:54321
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      STUDIO_PG_META_URL: http://localhost:54321/pg

  kong:
    image: kong:2.8.1
    ports:
      - "54321:8000"
      - "54324:8443"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
    volumes:
      - ./supabase/docker/volumes/api/kong.yml:/var/lib/kong/kong.yml
