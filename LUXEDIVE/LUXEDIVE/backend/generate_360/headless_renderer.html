<!DOCTYPE html>
<html>
<head>
    <title>3D Renderer</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer, model;

        async function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 5);

            renderer = new THREE.WebGLRenderer({
                canvas: document.getElementById('renderCanvas'),
                antialias: true,
                preserveDrawingBuffer: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 5, 5);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
            hemiLight.position.set(0, 20, 0);
            scene.add(hemiLight);

            window.isReady = true;
        }

        window.loadModel = async (modelUrl) => {
            return new Promise((resolve, reject) => {
                const loader = new GLTFLoader();
                loader.load(modelUrl, (gltf) => {
                    if (model) scene.remove(model);
                    model = gltf.scene;
                    
                    // Center model
                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    
                    model.position.sub(center); // Center at (0,0,0)
                    
                    // Adjust camera distance based on size (zoom in more)
                    const maxDim = Math.max(size.x, size.y, size.z);
                    camera.position.x = 0;
                    camera.position.y = maxDim * 0.4;
                    camera.position.z = maxDim * 1.8; // Zoomed in from 2.5
                    camera.lookAt(0, maxDim * 0.2, 0);


                    scene.add(model);
                    resolve({ success: true });
                }, undefined, (error) => {
                    console.error('Error loading model:', error);
                    reject(error);
                });
            });
        };

        window.renderAngle = (angle) => {
            if (!model) return null;
            
            // Set rotation
            model.rotation.y = THREE.MathUtils.degToRad(angle);
            
            // Render
            renderer.render(scene, camera);
            
            // Return base64 image
            return renderer.domElement.toDataURL('image/png');
        };

        init();
    </script>
</body>
</html>
